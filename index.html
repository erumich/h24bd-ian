<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Prototype</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        background-color: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 24px 16px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #333;
      }

      .figma-container {
        width: 100%;
        max-width: 1200px;
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        background: #fff;
      }

      .figma-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Figma Prototype</h1>
    <div class="figma-container">
      <!--
        Replace the `src` URL below with your Figma prototype embed link.
        To get the link: open your prototype in Figma → Share → Copy embed code,
        then paste the full URL from that code's `src` attribute here.
        Example src value:
          https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2F<fileKey>%2F<fileName>%3Fnode-id%3D...
      -->
     <iframe
  src="<iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/proto/55bKpPjzt3X3sA1SBKhJBy/You-got-a-mail--animation--Community-?page-id=[...]
  allowfullscreen
  title="Figma Prototype"
></iframe>
    </div>
  </body>
</html>
